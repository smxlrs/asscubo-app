name: iOS 无证书打包（自签测试用）

# 仅手动触发，不会被 push/tag 自动触发
on:
  workflow_dispatch:
    inputs:
      release_note:
        description: '版本说明（留空则自动生成）'
        required: false
        default: ''

jobs:
  build-ios-unsigned:
    name: Build iOS (Unsigned / Simulator)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: student-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: student-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Create .env file
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" > .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env

      - name: Read version from app.json
        id: vars
        run: |
          VERSION=$(node -e "const a=require('./app.json'); console.log(a.expo.version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}-ios-unsigned" >> $GITHUB_OUTPUT

      # -------------------------------------------------------
      # 核心步骤：用 ios-unsigned profile（simulator:true）构建
      # 不需要任何 Apple 开发者账号或证书，EAS 直接编译后返回
      # 一个 .tar.gz 压缩包，里面包含 .app 文件。
      # 下载后用爱思助手 / iOS App Signer / AltStore 重签即可安装真机。
      # -------------------------------------------------------
      - name: Build iOS (unsigned simulator build)
        id: ios_build
        run: |
          echo "🔨 开始构建无证书 iOS 包，请稍候（约 15-25 分钟）..."

          BUILD_JSON=$(eas build \
            --platform ios \
            --profile ios-unsigned \
            --non-interactive \
            --json \
            2>/dev/null)

          BUILD_URL=$(echo "$BUILD_JSON" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          item = data[0] if isinstance(data, list) else data
          arts = item.get('artifacts', {}) or {}
          url = arts.get('buildUrl') or item.get('buildUrl', '')
          print(url)
          " 2>/dev/null || echo "")

          if [ -z "$BUILD_URL" ]; then
            echo "❌ 无法获取构建产物 URL，构建失败"
            exit 1
          fi

          echo "✅ 构建成功，下载中: $BUILD_URL"

          # EAS simulator 构建产物通常是 .tar.gz（内含 .app）
          ARCHIVE_NAME="boxue-${{ steps.vars.outputs.version }}-ios-unsigned.tar.gz"
          curl -L -o "/tmp/$ARCHIVE_NAME" "$BUILD_URL"

          echo "build_url=$BUILD_URL"     >> $GITHUB_OUTPUT
          echo "archive_path=/tmp/$ARCHIVE_NAME" >> $GITHUB_OUTPUT
          echo "archive_name=$ARCHIVE_NAME"      >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: "博学 ${{ steps.vars.outputs.version }} - iOS 无证书包"
          body: |
            ## 博学 iOS 无证书测试包 ${{ steps.vars.outputs.version }}

            ${{ github.event.inputs.release_note != '' && github.event.inputs.release_note || '本次发布由 GitHub Actions 自动构建，用于自签名测试。' }}

            ---
            **构建信息**
            - 版本: `${{ steps.vars.outputs.version }}`
            - 平台: `iOS（无证书 / Simulator Build）`
            - 提交: `${{ github.sha }}`

            ---
            ## 📦 如何安装到真机（自签名）

            > **重要**：这是一个**模拟器构建版本**，需要重签名后才能安装到真机。

            ### 方法一：爱思助手（推荐，最简单）
            1. 下载下方 `.tar.gz` 文件并解压，得到 `.app` 文件夹
            2. 打开爱思助手 → 应用管理 → 安装应用
            3. 选择 `.app` 文件夹，爱思助手会自动完成重签和安装

            ### 方法二：iOS App Signer + Xcode
            1. 解压得到 `.app` 文件夹
            2. 用 [iOS App Signer](https://dantheman827.github.io/ios-app-signer/) 重签（需要免费 Apple ID 生成的开发证书）
            3. 用 Xcode → Devices & Simulators 安装到手机

            ### 方法三：AltStore / SideStore
            1. 解压 `.app` 文件夹，用工具重新打包成 `.ipa`
            2. 通过 AltStore 安装（7 天需重签）

            > **注意**：免费 Apple ID 签名有效期仅 7 天，到期需重签。
          draft: false
          prerelease: true
          files: |
            ${{ steps.ios_build.outputs.archive_path }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Done
        run: |
          echo "✅ 构建完成！"
          echo "📦 下载地址: https://github.com/${{ github.repository }}/releases/tag/${{ steps.vars.outputs.tag }}"
          echo ""
          echo "安装说明已包含在 Release 页面中。"
