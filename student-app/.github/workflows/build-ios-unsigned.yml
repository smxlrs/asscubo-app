name: iOS IPA（无证书，Sideloadly 自签用）

on:
  workflow_dispatch:
    inputs:
      release_note:
        description: '版本说明（留空则自动生成）'
        required: false
        default: ''

jobs:
  build-ios-ipa:
    name: Build iOS IPA (Unsigned)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: student-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: student-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Create .env file
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" > .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env

      - name: Read version from app.json
        id: vars
        run: |
          VERSION=$(node -e "const a=require('./app.json'); console.log(a.expo.version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}-ios-sideload" >> $GITHUB_OUTPUT

      # ── 第一步：EAS 云端编译（simulator:true，无需 Apple 证书）──────────
      - name: Build iOS unsigned via EAS
        id: eas_build
        run: |
          echo "🔨 EAS 云端编译中，约需 15-25 分钟..."

          BUILD_JSON=$(eas build \
            --platform ios \
            --profile ios-unsigned \
            --non-interactive \
            --json \
            2>/dev/null)

          BUILD_URL=$(echo "$BUILD_JSON" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          item = data[0] if isinstance(data, list) else data
          arts = item.get('artifacts', {}) or {}
          url = arts.get('buildUrl') or item.get('buildUrl', '')
          print(url)
          " 2>/dev/null || echo "")

          if [ -z "$BUILD_URL" ]; then
            echo "❌ 无法获取构建产物 URL"
            exit 1
          fi

          echo "✅ 编译成功，下载产物中..."
          curl -L -o /tmp/build_output.tar.gz "$BUILD_URL"
          echo "build_url=$BUILD_URL" >> $GITHUB_OUTPUT

      # ── 第二步：解压 .app，重打包成标准 .ipa ────────────────────────────
      # .ipa 本质 = zip，结构必须为 Payload/<AppName>.app
      - name: Repackage .app into .ipa
        id: repack
        run: |
          mkdir -p /tmp/ipa_work/Payload

          # 解压 EAS 产物（.tar.gz 内含 .app 目录）
          tar -xzf /tmp/build_output.tar.gz -C /tmp/ipa_work/Payload

          # 找到 .app
          APP_PATH=$(find /tmp/ipa_work/Payload -maxdepth 1 -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ 解压后未找到 .app 文件，EAS 产物结构异常"
            ls -la /tmp/ipa_work/Payload/
            exit 1
          fi

          echo "找到 .app: $APP_PATH"

          # 打包成 .ipa
          IPA_NAME="boxue-${{ steps.vars.outputs.version }}-unsigned.ipa"
          cd /tmp/ipa_work
          zip -r "/tmp/$IPA_NAME" Payload/
          echo "ipa_path=/tmp/$IPA_NAME" >> $GITHUB_OUTPUT
          echo "ipa_name=$IPA_NAME"      >> $GITHUB_OUTPUT
          echo "✅ IPA 打包完成：$IPA_NAME ($(du -sh /tmp/$IPA_NAME | cut -f1))"

      # ── 第三步：上传到 GitHub Releases ──────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: "博学 ${{ steps.vars.outputs.version }} - iOS 自签包（Sideloadly）"
          body: |
            ## 博学 iOS 自签测试包 v${{ steps.vars.outputs.version }}

            ${{ github.event.inputs.release_note != '' && github.event.inputs.release_note || '本次发布由 GitHub Actions 自动构建，供 Sideloadly 自签名使用。' }}

            ---
            **构建信息**
            - 版本: `${{ steps.vars.outputs.version }}`
            - 构建类型: iOS 未签名包（Simulator Build → IPA）
            - 提交: `${{ github.sha }}`

            ---
            ## 📱 Sideloadly 安装步骤

            1. 下载下方的 `.ipa` 文件
            2. 打开 [Sideloadly](https://sideloadly.io/)，连接 iPhone
            3. 将 `.ipa` 文件拖入 Sideloadly
            4. 填入你的 Apple ID（免费账号即可）
            5. 点击 **Start** 开始签名并安装
            6. 安装完成后，进入 iPhone **设置 → 通用 → VPN与设备管理** → 信任你的开发者证书
            7. 打开博学 App 即可使用

            > ⚠️ 免费 Apple ID 签名有效期 **7 天**，到期后需重新用 Sideloadly 安装一次。
            > 如需更长有效期（1年），需购买 Apple 开发者账号（$99/年）。
          draft: false
          prerelease: true
          files: |
            ${{ steps.repack.outputs.ipa_path }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Done
        run: |
          echo "✅ 完成！"
          echo "📦 Release: https://github.com/${{ github.repository }}/releases/tag/${{ steps.vars.outputs.tag }}"
