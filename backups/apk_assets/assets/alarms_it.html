
<h3>Creare un allarme</h3>
Per creare una nuova notifica, tieni premuto su un treno (nei risultati della ricerca orari), oppure premi il menu sulla destra di una fermata (nei dettagli del treno).<br/>
<br/>

<h3>Eliminare un allarme</h3>
Per eliminare un allarme, apri il menù popup posto sulla destra.<br/>
<br/>
