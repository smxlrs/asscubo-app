name: "iOS IPA - Unsigned (Sideloadly)"

# Builds a real-device IPA without Apple credentials.
# Uses macOS runner + Xcode with CODE_SIGNING_REQUIRED=NO.
# Output .ipa can be directly signed and installed via Sideloadly.

on:
  workflow_dispatch:
    inputs:
      release_note:
        description: "Version note (leave empty for auto)"
        required: false
        default: ""

jobs:
  build-ios-ipa:
    name: Build iOS IPA (Real Device, Unsigned)
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      # ── Select Xcode matching Swift 6.3.1 (required by ExpoModulesCore xcframework) ──
      # ExpoModulesCore.xcframework is prebuilt with Swift 6.3.1.
      # Running xcodebuild with an older Swift causes "SDK not supported" errors.
      - name: Select newest Xcode (needs Swift ≥ 6.3)
        run: |
          echo "=== Available Xcode versions ==="
          ls /Applications/Xcode*.app 2>/dev/null

          BEST_XCODE=""
          BEST_VER="0"
          for XCODE_APP in /Applications/Xcode*.app; do
            [ -d "$XCODE_APP" ] || continue
            SWIFT_BIN="$XCODE_APP/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/swift"
            [ -x "$SWIFT_BIN" ] || continue
            VER_STR=$("$SWIFT_BIN" --version 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
            [ -z "$VER_STR" ] && continue
            echo "  $XCODE_APP → Swift $VER_STR"
            # Prefer highest version
            if python3 -c "import sys; a='$VER_STR'.split('.'); b='$BEST_VER'.split('.'); sys.exit(0 if tuple(int(x) for x in a)>tuple(int(x) for x in b) else 1)" 2>/dev/null; then
              BEST_VER="$VER_STR"
              BEST_XCODE="$XCODE_APP"
            fi
          done

          if [ -n "$BEST_XCODE" ]; then
            echo "→ Selecting $BEST_XCODE (Swift $BEST_VER)"
            sudo xcode-select -s "$BEST_XCODE/Contents/Developer"
          fi

          echo "=== Active Xcode ==="
          xcodebuild -version
          swift --version

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: student-app/package-lock.json

      - name: Install dependencies
        working-directory: student-app
        run: npm ci

      - name: Create .env file
        working-directory: student-app
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" > .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env

      - name: Read version from app.json
        id: vars
        working-directory: student-app
        run: |
          VERSION=$(node -e "const a=require('./app.json'); console.log(a.expo.version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}-ios-sideload" >> $GITHUB_OUTPUT

      # ── Patch app.json before prebuild: disable expo-updates + switch to JSC ─
      # expo-updates: remove plugin + disable to prevent native module crash.
      # JSC: Hermes GC crashes deterministically on iOS 27 beta with a null-pointer
      #   write in youngGenEvacuateImpl (far=0x0). This is a Hermes/iOS 27 beta
      #   incompatibility. JavaScriptCore is Apple's native engine, always compatible.
      - name: Patch app.json (disable expo-updates, switch iOS to JSC)
        working-directory: student-app
        run: |
          node -e "
          const fs = require('fs');
          const cfg = JSON.parse(fs.readFileSync('app.json', 'utf8'));

          // 1. Disable expo-updates entirely
          cfg.expo.updates = { enabled: false, fallbackToCacheTimeout: 0 };
          delete cfg.expo.runtimeVersion;

          // 2. Remove expo-updates plugin (prevents EXUpdates native init)
          if (cfg.expo.plugins) {
            cfg.expo.plugins = cfg.expo.plugins.filter(p => {
              const name = Array.isArray(p) ? p[0] : p;
              return name !== 'expo-updates';
            });
          }

          // 3. Strip EAS project ID
          if (cfg.expo.extra && cfg.expo.extra.eas) {
            delete cfg.expo.extra.eas.projectId;
          }

          // 4. Switch JavaScript engine to JSC (JavaScriptCore) for iOS.
          //    Hermes GC crashes on iOS 27 beta: youngGenEvacuateImpl writes
          //    to null (far=0x0). JSC is Apple-maintained and always compatible.
          cfg.expo.ios = cfg.expo.ios || {};
          cfg.expo.ios.jsEngine = 'jsc';

          fs.writeFileSync('app.json', JSON.stringify(cfg, null, 2));
          console.log('Done: expo-updates removed, jsEngine=jsc for iOS');
          "

      # ── Patch ExpoModulesJSI podspec BEFORE prebuild ──────────────────────
      # ExpoModulesJSI.podspec contains a script_phases that spawns a nested
      # xcodebuild call to build an xcframework — this always fails in CI.
      # Removing script_phases lets CocoaPods compile it from source_files
      # normally as a static library instead. reanimated v4 still works because
      # we keep New Architecture enabled.
      - name: Patch ExpoModulesJSI podspec (remove nested xcframework build)
        working-directory: student-app
        run: |
          python3 << 'PYEOF'
          import subprocess, re, sys

          result = subprocess.run(
              ['find', 'node_modules', '-name', 'ExpoModulesJSI.podspec'],
              capture_output=True, text=True
          )
          paths = [p.strip() for p in result.stdout.strip().split('\n') if p.strip()]
          if not paths:
              print("ExpoModulesJSI.podspec not found - skipping patch")
              sys.exit(0)

          path = paths[0]
          print(f"Patching: {path}")

          with open(path, 'r') as f:
              content = f.read()

          # Remove the entire script_phases block (causes nested xcodebuild CI failure)
          patched = re.sub(
              r'\n[ \t]*s\.script_phases[ \t]*=[ \t]*\[.*?\]',
              '',
              content,
              flags=re.DOTALL
          )

          if patched != content:
              with open(path, 'w') as f:
                  f.write(patched)
              print("✓ Removed script_phases from ExpoModulesJSI.podspec")
          else:
              print("⚠ script_phases not found - may already be clean or pattern differs")
              if 'script_phases' in content:
                  idx = content.index('script_phases')
                  print(f"  Context: {content[max(0,idx-20):idx+100]!r}")
          PYEOF

      # ── Generate native iOS project (no Apple account needed) ────────────
      - name: Expo Prebuild (generate native iOS project)
        working-directory: student-app
        run: npx expo prebuild --platform ios --non-interactive --clean

      # ── Verify pbxproj ExpoModulesJSI script is intact (NOT no-op'd) ──────
      # With the correct Xcode/Swift version selected above, the xcframework
      # build script runs successfully — no patch needed.
      - name: Verify ExpoModulesJSI build phase is present
        working-directory: student-app
        run: |
          grep -c 'Build ExpoModulesJSI xcframework' ios/Pods/Pods.xcodeproj/project.pbxproj \
            && echo "✓ ExpoModulesJSI build phase present (will be built by xcodebuild)" \
            || echo "⚠ ExpoModulesJSI build phase not found — may need investigation"

      # ── Detect the Xcode scheme auto-generated by Expo ───────────────────
      - name: Detect Xcode scheme
        id: scheme
        working-directory: student-app/ios
        run: |
          SCHEME=$(xcodebuild -list 2>/dev/null \
            | awk '/Schemes:/{ found=1; next } found && NF{ print $1; exit }')
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "Detected Xcode scheme: $SCHEME"

      # ── Build for real device, skip code signing ─────────────────────────
      - name: Build IPA (iphoneos SDK, unsigned)
        id: build
        working-directory: student-app
        run: |
          SCHEME="${{ steps.scheme.outputs.scheme }}"
          WORKSPACE="ios/${SCHEME}.xcworkspace"
          DERIVED_DATA="/tmp/DerivedData"
          IPA_NAME="boxue-${{ steps.vars.outputs.version }}-unsigned.ipa"

          echo "Building scheme: $SCHEME"
          echo "Workspace: $WORKSPACE"

          # Build for real device — capture full log, show errors prominently
          set -o pipefail
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$DERIVED_DATA" \
            build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ENABLE_BITCODE=NO \
            SWIFT_VERSION=5 \
            2>&1 | tee /tmp/xcodebuild.log; BUILD_EXIT=${PIPESTATUS[0]}

          # Show actual errors/warnings
          echo "=== Errors & Warnings ==="
          grep -E "error:|warning:" /tmp/xcodebuild.log | grep -v "^note:" | head -80 || true
          echo "=== Last 30 lines ==="
          tail -30 /tmp/xcodebuild.log

          # Fail properly if build failed
          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "BUILD FAILED (exit $BUILD_EXIT)"
            exit "$BUILD_EXIT"
          fi

          # Find the real-device .app (exclude simulator outputs)
          APP_PATH=$(find "$DERIVED_DATA/Build/Products" \
            -maxdepth 3 \
            -name "*.app" \
            -not -path "*simulator*" \
            -not -path "*Simulator*" \
            | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: .app not found in DerivedData"
            find "$DERIVED_DATA/Build/Products" -maxdepth 3 | head -30
            exit 1
          fi
          echo "Found .app: $APP_PATH"
          echo "App size:   $(du -sh "$APP_PATH" | cut -f1)"
          echo "Contents:   $(ls "$APP_PATH")"

          # Verify the main executable exists and is non-empty
          APP_BINARY="$APP_PATH/$(basename "$APP_PATH" .app)"
          if [ ! -f "$APP_BINARY" ] || [ ! -s "$APP_BINARY" ]; then
            echo "ERROR: Main binary missing or empty: $APP_BINARY"
            echo "This usually means the build succeeded partially."
            ls -la "$APP_PATH" || true
            exit 1
          fi
          echo "Binary:     $APP_BINARY ($(du -sh "$APP_BINARY" | cut -f1))"

          # Package as .ipa (Payload/<AppName>.app → zip)
          mkdir -p /tmp/ipa_payload/Payload
          cp -r "$APP_PATH" /tmp/ipa_payload/Payload/
          cd /tmp/ipa_payload
          zip -r "/tmp/$IPA_NAME" Payload/

          IPA_SIZE=$(du -sh "/tmp/$IPA_NAME" | cut -f1)
          echo "ipa_path=/tmp/$IPA_NAME" >> $GITHUB_OUTPUT
          echo "ipa_name=$IPA_NAME"      >> $GITHUB_OUTPUT
          echo "IPA ready: $IPA_NAME ($IPA_SIZE)"



      # ── Upload to GitHub Releases ─────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: "博学 ${{ steps.vars.outputs.version }} - iOS 自签包（Sideloadly）"
          body: |
            ## 博学 iOS 自签测试包 v${{ steps.vars.outputs.version }}

            ${{ github.event.inputs.release_note != '' && github.event.inputs.release_note || '由 GitHub Actions 自动构建，供 Sideloadly 自签名安装使用（真机 arm64）。' }}

            ---
            **构建信息**
            - 版本：`${{ steps.vars.outputs.version }}`
            - 类型：iOS 真机包（iphoneos SDK，未签名）
            - 提交：`${{ github.sha }}`

            ---
            ## 📱 Sideloadly 安装步骤

            1. 下载下方的 `.ipa` 文件
            2. 打开 [Sideloadly](https://sideloadly.io/)，用 USB 连接 iPhone
            3. 将 `.ipa` 拖入 Sideloadly
            4. 填入你的 Apple ID（免费账号即可）
            5. 点击 **Start** 开始签名并安装
            6. 进入 iPhone **设置 → 通用 → VPN与设备管理** → 信任你的开发者证书
            7. 打开博学 App

            > ⚠️ 免费 Apple ID 签名有效期 **7 天**，到期后重新用 Sideloadly 安装一次即可续期。


          draft: false
          prerelease: true
          files: |
            ${{ steps.build.outputs.ipa_path }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Done
        run: |
          echo "Done! Release: https://github.com/${{ github.repository }}/releases/tag/${{ steps.vars.outputs.tag }}"
