name: "iOS IPA - Unsigned (Sideloadly)"

# Builds a real-device IPA without Apple credentials.
# Uses macOS runner + Xcode with CODE_SIGNING_REQUIRED=NO.
# Output .ipa can be directly signed and installed via Sideloadly.

on:
  workflow_dispatch:
    inputs:
      release_note:
        description: "Version note (leave empty for auto)"
        required: false
        default: ""

jobs:
  build-ios-ipa:
    name: Build iOS IPA (Real Device, Unsigned)
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: student-app/package-lock.json

      - name: Install dependencies
        working-directory: student-app
        run: npm ci

      - name: Create .env file
        working-directory: student-app
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" > .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env

      - name: Read version from app.json
        id: vars
        working-directory: student-app
        run: |
          VERSION=$(node -e "const a=require('./app.json'); console.log(a.expo.version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}-ios-sideload" >> $GITHUB_OUTPUT

      # ── Generate native iOS project (no Apple account needed) ────────────
      - name: Expo Prebuild (generate native iOS project)
        working-directory: student-app
        run: npx expo prebuild --platform ios --non-interactive --clean

      # ── Detect the Xcode scheme auto-generated by Expo ───────────────────
      - name: Detect Xcode scheme
        id: scheme
        working-directory: student-app/ios
        run: |
          SCHEME=$(xcodebuild -list 2>/dev/null \
            | awk '/Schemes:/{ found=1; next } found && NF{ print $1; exit }')
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "Detected Xcode scheme: $SCHEME"

      # ── Build for real device, skip code signing ─────────────────────────
      - name: Build IPA (iphoneos SDK, unsigned)
        id: build
        working-directory: student-app
        run: |
          SCHEME="${{ steps.scheme.outputs.scheme }}"
          WORKSPACE="ios/${SCHEME}.xcworkspace"
          ARCHIVE_PATH="/tmp/Boxue.xcarchive"
          IPA_NAME="boxue-${{ steps.vars.outputs.version }}-unsigned.ipa"

          echo "Building scheme: $SCHEME"
          echo "Workspace: $WORKSPACE"

          # Build & archive for real device, code signing disabled
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$ARCHIVE_PATH" \
            archive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ENABLE_BITCODE=NO \
            2>&1 | tail -50

          # Find the .app inside the archive
          APP_PATH=$(find "$ARCHIVE_PATH/Products/Applications" -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: .app not found in archive"
            find "$ARCHIVE_PATH" -type d | head -20
            exit 1
          fi
          echo "Found .app: $APP_PATH"

          # Repackage as .ipa (Payload/<AppName>.app → zip)
          mkdir -p /tmp/ipa_payload/Payload
          cp -r "$APP_PATH" /tmp/ipa_payload/Payload/
          cd /tmp/ipa_payload
          zip -r "/tmp/$IPA_NAME" Payload/

          echo "ipa_path=/tmp/$IPA_NAME" >> $GITHUB_OUTPUT
          echo "ipa_name=$IPA_NAME"      >> $GITHUB_OUTPUT
          echo "IPA ready: $IPA_NAME ($(du -sh /tmp/$IPA_NAME | cut -f1))"

      # ── Upload to GitHub Releases ─────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: "Boxue ${{ steps.vars.outputs.version }} - iOS Unsigned IPA (Sideloadly)"
          body: |
            ## Boxue iOS Unsigned IPA v${{ steps.vars.outputs.version }}

            ${{ github.event.inputs.release_note != '' && github.event.inputs.release_note || 'Auto-built for Sideloadly self-signing. Real device build (arm64).' }}

            ---
            **Build Info**
            - Version: `${{ steps.vars.outputs.version }}`
            - Type: Real device IPA (iphoneos SDK, unsigned)
            - Commit: `${{ github.sha }}`

            ---
            ## How to install with Sideloadly

            1. Download the `.ipa` file below
            2. Open [Sideloadly](https://sideloadly.io/) and connect your iPhone via USB
            3. Drag the `.ipa` into Sideloadly
            4. Enter your Apple ID (free account works)
            5. Click **Start** to sign and install
            6. On iPhone: **Settings > General > VPN & Device Management** → trust your developer certificate
            7. Open Boxue

            > Note: Free Apple ID signatures expire after **7 days**. Re-run Sideloadly to renew.
          draft: false
          prerelease: true
          files: |
            ${{ steps.build.outputs.ipa_path }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Done
        run: |
          echo "Done! Release: https://github.com/${{ github.repository }}/releases/tag/${{ steps.vars.outputs.tag }}"
