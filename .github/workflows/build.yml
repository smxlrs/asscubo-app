name: EAS Build (APK + IPA)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '打包平台'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all
      profile:
        description: '打包配置（preview=测试APK, production=正式包）'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允许上传到 GitHub Releases
    defaults:
      run:
        working-directory: student-app

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # EAS 需要完整 git 历史获取 commit 信息

      - name: 🟢 Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: student-app/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔧 Setup Expo & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🌍 Create .env file
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" > .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env

      - name: 🎯 Set platform & profile
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "platform=all"       >> $GITHUB_OUTPUT
            echo "profile=production" >> $GITHUB_OUTPUT
          else
            echo "platform=${{ github.event.inputs.platform }}" >> $GITHUB_OUTPUT
            echo "profile=${{ github.event.inputs.profile }}"   >> $GITHUB_OUTPUT
          fi

      # ── Android：构建并等待完成，然后下载 APK ─────────────────
      - name: 🤖 Build Android & Download APK
        if: steps.vars.outputs.platform == 'android' || steps.vars.outputs.platform == 'all'
        run: |
          BUILD_URL=$(eas build \
            --platform android \
            --profile ${{ steps.vars.outputs.profile }} \
            --non-interactive \
            --wait \
            --json \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          item = data[0] if isinstance(data, list) else data
          print(item.get('artifacts', {}).get('buildUrl', '') or item.get('url', ''))
          " 2>/dev/null || echo "")

          echo "Android build URL: $BUILD_URL"

          if [ -n "$BUILD_URL" ]; then
            curl -L -o ../android-release.apk "$BUILD_URL"
            echo "✅ APK downloaded successfully"
          else
            echo "⚠️ Could not get download URL, check expo.dev manually"
          fi

      - name: 📤 Upload Android APK to GitHub
        if: (steps.vars.outputs.platform == 'android' || steps.vars.outputs.platform == 'all') && hashFiles('../android-release.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ steps.vars.outputs.profile }}-${{ github.run_number }}
          path: android-release.apk
          retention-days: 30

      # ── iOS：构建并等待完成，然后下载 IPA ────────────────────
      - name: 🍎 Build iOS & Download IPA
        if: steps.vars.outputs.platform == 'ios' || steps.vars.outputs.platform == 'all'
        run: |
          BUILD_URL=$(eas build \
            --platform ios \
            --profile ${{ steps.vars.outputs.profile }} \
            --non-interactive \
            --wait \
            --json \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          item = data[0] if isinstance(data, list) else data
          print(item.get('artifacts', {}).get('buildUrl', '') or item.get('url', ''))
          " 2>/dev/null || echo "")

          echo "iOS build URL: $BUILD_URL"

          if [ -n "$BUILD_URL" ]; then
            curl -L -o ../ios-release.ipa "$BUILD_URL"
            echo "✅ IPA downloaded successfully"
          fi

      - name: 📤 Upload iOS IPA to GitHub
        if: (steps.vars.outputs.platform == 'ios' || steps.vars.outputs.platform == 'all') && hashFiles('../ios-release.ipa') != ''
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ steps.vars.outputs.profile }}-${{ github.run_number }}
          path: ios-release.ipa
          retention-days: 30

      - name: ✅ Summary
        run: |
          echo "=================================="
          echo "构建完成！在本次 Actions 运行页面的"
          echo "右上角 Artifacts 区域可直接下载 APK/IPA"
          echo "=================================="
