name: EAS Build (APK + IPA)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '打包平台'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all
      profile:
        description: '打包配置（preview=测试APK, production=正式包）'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: student-app

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: student-app/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔧 Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: 🔑 Verify Expo login
        run: eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 🌍 Create .env file
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" > .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env

      - name: 🎯 Set platform & profile
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "platform=all"       >> $GITHUB_OUTPUT
            echo "profile=production" >> $GITHUB_OUTPUT
          else
            echo "platform=${{ github.event.inputs.platform }}" >> $GITHUB_OUTPUT
            echo "profile=${{ github.event.inputs.profile }}"   >> $GITHUB_OUTPUT
          fi

      # ── Android ──────────────────────────────────────────────
      - name: 🤖 Build Android & Download APK
        if: steps.vars.outputs.platform == 'android' || steps.vars.outputs.platform == 'all'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform android \
            --profile ${{ steps.vars.outputs.profile }} \
            --non-interactive \
            --wait \
            --json > /tmp/android_build.json 2>&1 || true

          cat /tmp/android_build.json

          BUILD_URL=$(python3 -c "
          import json, sys
          try:
            data = json.load(open('/tmp/android_build.json'))
            item = data[0] if isinstance(data, list) else data
            url = item.get('artifacts', {}).get('buildUrl') or item.get('url', '')
            print(url)
          except: pass
          " 2>/dev/null || echo "")

          if [ -n "$BUILD_URL" ]; then
            echo "Downloading APK from: $BUILD_URL"
            curl -L -o /tmp/android-release.apk "$BUILD_URL"
            cp /tmp/android-release.apk ../android-release.apk
          fi

      - name: 📤 Upload APK to GitHub Artifacts
        if: steps.vars.outputs.platform == 'android' || steps.vars.outputs.platform == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ steps.vars.outputs.profile }}-build${{ github.run_number }}
          path: android-release.apk
          if-no-files-found: warn
          retention-days: 30

      # ── iOS ──────────────────────────────────────────────────
      - name: 🍎 Build iOS & Download IPA
        if: steps.vars.outputs.platform == 'ios' || steps.vars.outputs.platform == 'all'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform ios \
            --profile ${{ steps.vars.outputs.profile }} \
            --non-interactive \
            --wait \
            --json > /tmp/ios_build.json 2>&1 || true

          BUILD_URL=$(python3 -c "
          import json
          try:
            data = json.load(open('/tmp/ios_build.json'))
            item = data[0] if isinstance(data, list) else data
            print(item.get('artifacts', {}).get('buildUrl') or item.get('url', ''))
          except: pass
          " 2>/dev/null || echo "")

          if [ -n "$BUILD_URL" ]; then
            curl -L -o /tmp/ios-release.ipa "$BUILD_URL"
            cp /tmp/ios-release.ipa ../ios-release.ipa
          fi

      - name: 📤 Upload IPA to GitHub Artifacts
        if: steps.vars.outputs.platform == 'ios' || steps.vars.outputs.platform == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ steps.vars.outputs.profile }}-build${{ github.run_number }}
          path: ios-release.ipa
          if-no-files-found: warn
          retention-days: 30

      - name: ✅ Done
        run: echo "构建完成！在本次 Actions 页面右上角 Artifacts 区域下载 APK/IPA"
