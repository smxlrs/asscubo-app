name: EAS Build (APK + IPA)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '打包平台'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all
      profile:
        description: '打包配置'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
      version:
        description: '版本号（如 1.0.1，填写后自动创建 GitHub Release）'
        required: false
        default: ''

  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 需要 write 权限才能创建 Release

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1
          submodules: false

      - name: 🔍 Debug git & environment
        run: |
          echo "=== git version ==="
          git --version
          echo "=== workspace ==="
          ls -la $GITHUB_WORKSPACE

      - name: 🟢 Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: student-app/package-lock.json

      - name: 📦 Install dependencies
        working-directory: student-app
        run: npm ci --legacy-peer-deps

      - name: 🔧 Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: ☕ Setup JDK 17
        if: steps.vars.outputs.platform == 'android' || steps.vars.outputs.platform == 'all'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔑 Verify Expo login
        working-directory: student-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas whoami

      - name: 🌍 Create .env
        working-directory: student-app
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" > .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env

      - name: 🎯 Set platform, profile & version
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "platform=all"       >> $GITHUB_OUTPUT
            echo "profile=production" >> $GITHUB_OUTPUT
            # 从 tag 提取版本号，如 refs/tags/v1.0.1 → 1.0.1
            TAG="${{ github.ref_name }}"
            VER="${TAG#v}"
            echo "version=${VER}"   >> $GITHUB_OUTPUT
            echo "create_release=true" >> $GITHUB_OUTPUT
            # Update app.json locally for push builds
            node -e "
              const fs = require('fs');
              const appJson = JSON.parse(fs.readFileSync('student-app/app.json', 'utf8'));
              appJson.expo.version = '${VER}';
              if (!appJson.expo.android) appJson.expo.android = {};
              appJson.expo.android.versionCode = ${{ github.run_number }};
              fs.writeFileSync('student-app/app.json', JSON.stringify(appJson, null, 2) + '\n');
            "
          else
            echo "platform=${{ github.event.inputs.platform }}" >> $GITHUB_OUTPUT
            echo "profile=${{ github.event.inputs.profile }}"   >> $GITHUB_OUTPUT
            VER="${{ github.event.inputs.version }}"
            if [ -z "$VER" ]; then
              # Auto-generate version from app.json base + run_number
              BASE_VER=$(node -p "
                const v = require('./student-app/app.json').expo.version;
                const parts = v.split('.');
                parts.slice(0, 3).join('.');
              ")
              VER="${BASE_VER}.${{ github.run_number }}"
              # Update app.json locally for the build
              node -e "
                const fs = require('fs');
                const appJson = JSON.parse(fs.readFileSync('student-app/app.json', 'utf8'));
                appJson.expo.version = '${VER}';
                if (!appJson.expo.android) appJson.expo.android = {};
                appJson.expo.android.versionCode = ${{ github.run_number }};
                fs.writeFileSync('student-app/app.json', JSON.stringify(appJson, null, 2) + '\n');
              "
            fi
            echo "version=${VER}" >> $GITHUB_OUTPUT
            echo "create_release=true" >> $GITHUB_OUTPUT
          fi

      # ── Android ──────────────────────────────────────────────
      - name: 🤖 Build Android (Local)
        if: steps.vars.outputs.platform == 'android' || steps.vars.outputs.platform == 'all'
        working-directory: student-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_LOCAL_BUILD_ARTIFACTS_DIR: build-artifacts
        run: |
          # 运行本地构建
          eas build \
            --platform android \
            --profile ${{ steps.vars.outputs.profile }} \
            --local \
            --non-interactive

          # 查看生成的文件并移动到指定位置
          echo "=== Local Build Artifacts ==="
          ls -la build-artifacts/

          # 寻找生成的 APK 或 AAB
          APK_FILE=$(find build-artifacts -name "*.apk" | head -n 1)
          AAB_FILE=$(find build-artifacts -name "*.aab" | head -n 1)

          if [ -n "$APK_FILE" ]; then
            cp "$APK_FILE" boxue.apk
            echo "✅ Android APK created: boxue.apk"
          elif [ -n "$AAB_FILE" ]; then
            cp "$AAB_FILE" boxue.aab
            echo "✅ Android AAB created: boxue.aab"
          else
            echo "❌ No build artifact (.apk or .aab) found!"
            exit 1
          fi

      - name: 📤 Upload APK/AAB Artifact
        if: steps.vars.outputs.platform == 'android' || steps.vars.outputs.platform == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ steps.vars.outputs.profile }}-build${{ github.run_number }}
          path: |
            student-app/boxue.apk
            student-app/boxue.aab
          if-no-files-found: warn
          retention-days: 30

      # ── iOS ──────────────────────────────────────────────────
      - name: 🍎 Build iOS
        if: steps.vars.outputs.platform == 'ios' || steps.vars.outputs.platform == 'all'
        working-directory: student-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform ios \
            --profile ${{ steps.vars.outputs.profile }} \
            --non-interactive \
            --wait \
            --json > /tmp/ios_build.json

          BUILD_URL=$(python3 << 'PYEOF'
          import json, sys
          try:
              data = json.load(open('/tmp/ios_build.json'))
              item = data[0] if isinstance(data, list) else data
              url = (item.get('artifacts') or {}).get('buildUrl') or item.get('url', '')
              if url: print(url)
          except Exception as e:
              print(f"error: {e}", file=sys.stderr)
          PYEOF
          )

          if [ -n "$BUILD_URL" ] && [ "$BUILD_URL" != "None" ]; then
            curl -L -f -o ios-release.ipa "$BUILD_URL"
          fi

      - name: 📤 Upload IPA Artifact
        if: steps.vars.outputs.platform == 'ios' || steps.vars.outputs.platform == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ steps.vars.outputs.profile }}-build${{ github.run_number }}
          path: student-app/ios-release.ipa
          if-no-files-found: warn
          retention-days: 30

      # ── GitHub Release（有版本号时自动发布）────────────────
      - name: 🚀 Create GitHub Release
        if: steps.vars.outputs.create_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.vars.outputs.version }}"
          TAG="v${VERSION}"

          # 整理要附加的文件
          ASSETS=""
          [ -f student-app/boxue.apk ]           && ASSETS="$ASSETS student-app/boxue.apk"
          [ -f student-app/boxue.aab ]           && ASSETS="$ASSETS student-app/boxue.aab"
          [ -f student-app/ios-release.ipa ]     && ASSETS="$ASSETS student-app/ios-release.ipa"

          # 创建 Release（如果 tag 不存在则自动创建）
          gh release create "$TAG" \
            --title "博学 v${VERSION}" \
            --notes "## 版本 ${VERSION}

          **下载方式：**
          - **Android** 用户：下载 \`boxue.apk\` 文件进行安装。如果是上架 Google Play，请使用 \`boxue.aab\`。
          - **iOS** 用户：下载 \`ios-release.ipa\` 安装。

          > 在 App 内「关于」页面检查更新即可。" \
            $ASSETS \
            2>&1 || echo "Release creation failed (tag may already exist)"
