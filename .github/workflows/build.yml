name: EAS Build (APK + IPA)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 修复 Node.js 20 废弃警告

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '打包平台'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all
      profile:
        description: '打包配置（preview=测试APK, production=正式包）'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🔧 Fix git safe.directory (prevent exit 128)
        run: git config --global --add safe.directory '*'

      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: student-app/package-lock.json

      - name: 📦 Install dependencies
        working-directory: student-app
        run: npm ci

      - name: 🔧 Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: 🔑 Verify Expo login
        working-directory: student-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas whoami

      - name: 🌍 Create .env file
        working-directory: student-app
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" > .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env

      - name: 🎯 Set platform & profile
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "platform=all"       >> $GITHUB_OUTPUT
            echo "profile=production" >> $GITHUB_OUTPUT
          else
            echo "platform=${{ github.event.inputs.platform }}" >> $GITHUB_OUTPUT
            echo "profile=${{ github.event.inputs.profile }}"   >> $GITHUB_OUTPUT
          fi

      # ── Android ──────────────────────────────────────────────
      - name: 🤖 Build Android
        if: steps.vars.outputs.platform == 'android' || steps.vars.outputs.platform == 'all'
        working-directory: student-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform android \
            --profile ${{ steps.vars.outputs.profile }} \
            --non-interactive \
            --wait \
            --json 2>&1 | tee /tmp/android_build.json

          BUILD_URL=$(python3 -c "
          import json, sys
          try:
            lines = open('/tmp/android_build.json').read()
            # find JSON in output
            import re
            matches = re.findall(r'\[.*\]|\{.*\}', lines, re.DOTALL)
            for m in matches:
              try:
                data = json.loads(m)
                item = data[0] if isinstance(data, list) else data
                url = (item.get('artifacts') or {}).get('buildUrl') or item.get('url','')
                if url: print(url); break
              except: pass
          except Exception as e: print('', file=sys.stderr)
          " 2>/dev/null || echo "")

          if [ -n "\$BUILD_URL" ]; then
            echo "📥 Downloading APK..."
            curl -L -o android-release.apk "\$BUILD_URL"
            echo "✅ APK ready"
          else
            echo "⚠️ No download URL found – check https://expo.dev/accounts/${{ secrets.EXPO_USERNAME }}/projects/union-student-app/builds"
          fi

      - name: 📤 Upload APK to GitHub
        if: steps.vars.outputs.platform == 'android' || steps.vars.outputs.platform == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ steps.vars.outputs.profile }}-build${{ github.run_number }}
          path: student-app/android-release.apk
          if-no-files-found: warn
          retention-days: 30

      # ── iOS ──────────────────────────────────────────────────
      - name: 🍎 Build iOS
        if: steps.vars.outputs.platform == 'ios' || steps.vars.outputs.platform == 'all'
        working-directory: student-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform ios \
            --profile ${{ steps.vars.outputs.profile }} \
            --non-interactive \
            --wait \
            --json 2>&1 | tee /tmp/ios_build.json

          BUILD_URL=$(python3 -c "
          import json, re
          try:
            lines = open('/tmp/ios_build.json').read()
            for m in re.findall(r'\[.*\]|\{.*\}', lines, re.DOTALL):
              try:
                data = json.loads(m)
                item = data[0] if isinstance(data, list) else data
                url = (item.get('artifacts') or {}).get('buildUrl') or item.get('url','')
                if url: print(url); break
              except: pass
          except: pass
          " 2>/dev/null || echo "")

          if [ -n "\$BUILD_URL" ]; then
            curl -L -o ios-release.ipa "\$BUILD_URL"
          fi

      - name: 📤 Upload IPA to GitHub
        if: steps.vars.outputs.platform == 'ios' || steps.vars.outputs.platform == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ steps.vars.outputs.profile }}-build${{ github.run_number }}
          path: student-app/ios-release.ipa
          if-no-files-found: warn
          retention-days: 30

      - name: ✅ Done
        run: echo "构建完成！在本次 Actions 页面右上角 Artifacts 区域下载 APK/IPA"
