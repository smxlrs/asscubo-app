name: EAS Build (APK + IPA)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '打包平台'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all
      profile:
        description: '打包配置'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ── Step 1: Checkout ─────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false   # 不让 checkout 自动配置 git credential
          fetch-depth: 1               # 只要最新一个 commit，不需要完整历史

      # ── Step 2: 诊断 git 状态 ────────────────────────────────
      - name: 🔍 Debug git & environment
        run: |
          echo "=== git version ==="
          git --version
          echo "=== whoami ==="
          whoami
          echo "=== workspace ==="
          ls -la $GITHUB_WORKSPACE
          echo "=== git status ==="
          git status || echo "git status failed"
          echo "=== git log ==="
          git log --oneline -3 || echo "git log failed"

      # ── Step 3: Node.js ──────────────────────────────────────
      - name: 🟢 Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: student-app/package-lock.json

      # ── Step 4: npm ci ───────────────────────────────────────
      - name: 📦 Install dependencies
        working-directory: student-app
        run: npm ci

      # ── Step 5: EAS CLI ──────────────────────────────────────
      - name: 🔧 Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: 🔑 Verify Expo login
        working-directory: student-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas whoami

      # ── Step 6: .env ─────────────────────────────────────────
      - name: 🌍 Create .env
        working-directory: student-app
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" > .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env

      # ── Step 7: Build ─────────────────────────────────────────
      - name: 🎯 Set platform & profile
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "platform=all"       >> $GITHUB_OUTPUT
            echo "profile=production" >> $GITHUB_OUTPUT
          else
            echo "platform=${{ github.event.inputs.platform }}" >> $GITHUB_OUTPUT
            echo "profile=${{ github.event.inputs.profile }}"   >> $GITHUB_OUTPUT
          fi

      - name: 🤖 Build Android
        if: steps.vars.outputs.platform == 'android' || steps.vars.outputs.platform == 'all'
        working-directory: student-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform android \
            --profile ${{ steps.vars.outputs.profile }} \
            --non-interactive \
            --wait \
            --json 2>&1 | tee /tmp/android_build.json

          BUILD_URL=$(python3 -c "
          import json, re, sys
          try:
            text = open('/tmp/android_build.json').read()
            for m in re.findall(r'\[.*?\]|\{.*?\}', text, re.DOTALL):
              try:
                data = json.loads(m)
                item = data[0] if isinstance(data, list) else data
                url = (item.get('artifacts') or {}).get('buildUrl') or item.get('url','')
                if url: print(url); sys.exit(0)
              except: pass
          except: pass
          " 2>/dev/null || echo "")

          if [ -n "$BUILD_URL" ]; then
            echo "📥 Downloading APK from $BUILD_URL"
            curl -L -o android-release.apk "$BUILD_URL"
          else
            echo "⚠️ No URL found. Check: https://expo.dev/accounts/${{ secrets.EXPO_USERNAME }}/projects/union-student-app/builds"
          fi

      - name: 📤 Upload APK
        if: steps.vars.outputs.platform == 'android' || steps.vars.outputs.platform == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ steps.vars.outputs.profile }}-build${{ github.run_number }}
          path: student-app/android-release.apk
          if-no-files-found: warn
          retention-days: 30

      - name: 🍎 Build iOS
        if: steps.vars.outputs.platform == 'ios' || steps.vars.outputs.platform == 'all'
        working-directory: student-app
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform ios \
            --profile ${{ steps.vars.outputs.profile }} \
            --non-interactive \
            --wait \
            --json 2>&1 | tee /tmp/ios_build.json

          BUILD_URL=$(python3 -c "
          import json, re, sys
          try:
            text = open('/tmp/ios_build.json').read()
            for m in re.findall(r'\[.*?\]|\{.*?\}', text, re.DOTALL):
              try:
                data = json.loads(m)
                item = data[0] if isinstance(data, list) else data
                url = (item.get('artifacts') or {}).get('buildUrl') or item.get('url','')
                if url: print(url); sys.exit(0)
              except: pass
          except: pass
          " 2>/dev/null || echo "")

          if [ -n "$BUILD_URL" ]; then
            curl -L -o ios-release.ipa "$BUILD_URL"
          fi

      - name: 📤 Upload IPA
        if: steps.vars.outputs.platform == 'ios' || steps.vars.outputs.platform == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ steps.vars.outputs.profile }}-build${{ github.run_number }}
          path: student-app/ios-release.ipa
          if-no-files-found: warn
          retention-days: 30
