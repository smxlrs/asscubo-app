<div style="background-color: #F5F7FA; padding: 40px 15px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 480px; background-color: #ffffff; border: 1px solid #e4e7ec; border-radius: 20px; box-shadow: 0 4px 16px rgba(0,0,0,0.02); overflow: hidden;">
    <!-- 顶部 Logo 区域 (宽度 85px) -->
    <tr>
      <td style="padding: 35px 30px 20px 30px; text-align: left;">
        <img src="https://avxzgaozbfeqttmhmlld.supabase.co/storage/v1/object/public/logo/logo.png" alt="ASSCUBO Logo" width="85" style="width: 85px; height: auto; display: block; border: 0;">
      </td>
    </tr>
    <!-- 邮件主内容区 -->
    <tr>
      <td style="padding: 0 30px 20px 30px; text-align: left;">
        <h2 style="color: #1d2939; font-size: 20px; font-weight: 700; margin: 0 0 16px 0; line-height: 1.4;">确认您的身份</h2>
        <p style="color: #475467; font-size: 14px; line-height: 1.6; margin: 0 0 12px 0;">您正在对 <b>博学平台</b> 账户进行敏感操作（如注销账户）。</p>
        <p style="color: #475467; font-size: 14px; line-height: 1.6; margin: 0 0 20px 0;">请在应用中输入以下 6 位验证码以确认您的身份：</p>
        
        <!-- 验证码卡片 -->
        <table border="0" cellpadding="0" cellspacing="0" style="margin: 0 0 24px 0; background-color: #f8f9fa; border: 1px solid #eaecf0; border-radius: 12px; width: 100%;">
          <tr>
            <td align="center" style="padding: 16px; font-size: 28px; font-weight: 700; letter-spacing: 6px; color: #A31621; font-family: monospace;">
              {{ .Token }}
            </td>
          </tr>
        </table>

        <p style="color: #98a2b3; font-size: 12px; line-height: 1.6; margin: 0;">此验证码在 5 分钟内有效。如果不是您本人的操作，请立即忽略此邮件，您的账户是安全的。</p>
      </td>
    </tr>
    <!-- 底部细分割线 -->
    <tr>
      <td style="padding: 0 30px;">
        <div style="border-top: 1px solid #f2f4f7; height: 1px; width: 100%;"></div>
      </td>
    </tr>
    <!-- 底部版权和提示 -->
    <tr>
      <td style="padding: 20px 30px 35px 30px; text-align: left;">
        <p style="color: #98a2b3; font-size: 11px; line-height: 1.6; margin: 0;">
          <strong>博洛尼亚大学中国学生学者联谊会 (ASSCUBO)</strong><br>
          <span style="color: #cbd5e1; font-size: 10px;">此邮件由系统自动发送，请勿直接回复。</span>
        </p>
      </td>
    </tr>
  </table>
</div>
